# Preserve the original scheme from the upstream proxy (Cloudflare/Traefik set
# X-Forwarded-Proto=https); fall back to our own only when it's absent. Without
# this, nginx would overwrite it with its internal "http" and the backend would
# think the request was insecure.
map $http_x_forwarded_proto $client_proto {
  default $http_x_forwarded_proto;
  ""      $scheme;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Allow photo/image uploads (backend caps at 5–8 MB); nginx default is 1 MB.
  client_max_body_size 10m;

  # Long-cache hashed assets.
  location /assets/ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, immutable";
  }

  # Proxy the API + socket.io + uploads to the backend service.
  location /api/ {
    proxy_pass http://backend:5000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $client_proto;
    # WebSocket upgrade for socket.io (path /api/socket.io).
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 86400;
  }

  location /uploads/ {
    proxy_pass http://backend:5000;
    proxy_set_header Host $host;
    expires 7d;
  }

  # SPA fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
