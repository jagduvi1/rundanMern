<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="description" content="GameDo — kör gruppspel tillsammans med en delad live-resultattavla." />
    <!-- Brand fonts: Bricolage Grotesque (display/wordmark) + Hanken Grotesk (body/UI).
         Loaded here so they apply document-wide (incl. the in-page SVG wordmark) and in
         parallel; the --font / --font-display fallback chains degrade gracefully if blocked. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600..800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" />
    <link rel="icon" type="image/svg+xml" href="/assets/gamedo-mark.svg" />
    <link rel="manifest" href="/manifest.json" />
    <!-- iOS home-screen install (Web Push + foreground geofence need an installed PWA).
         iOS ignores the manifest icon, so an apple-touch-icon PNG is required. -->
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="GameDo" />
    <title>GameDo</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
